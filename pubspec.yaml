name: finance_analytics_app
description: "Personal finance analytics application with clean architecture."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  archive: ^3.6.1
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  csv: ^6.0.0
  drift: ^2.28.2
  excel: ^4.0.6
  equatable: ^2.0.7
  file_picker: ^10.3.2
  fl_chart: ^1.1.1
  flutter_bloc: ^9.1.1
  flutter_local_notifications: ^21.0.0
  flutter_secure_storage: ^9.2.4
  flutter_timezone: ^5.0.1
  go_router: ^16.2.1
  google_fonts: ^6.3.2
  intl: ^0.20.2
  local_auth: ^2.3.0
  path: ^1.9.1
  path_provider: ^2.1.5
  pdf: ^3.11.3
  cryptography: ^2.7.0
  sqlite3_flutter_libs: ^0.5.39
  timezone: ^0.11.0
  workmanager: ^0.9.0+3
  xml: ^6.6.1
  open_filex: ^4.7.0
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.2.0
  google_sign_in: ^7.2.0

dev_dependencies:
  build_runner: ^2.7.1
  drift_dev: ^2.28.2
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
    image_path: "daily_use_logo.png"
  windows:
    generate: true
    image_path: "daily_use_logo.png"
  macos:
    generate: true
    image_path: "daily_use_logo.png"
  image_path: "daily_use_logo.png"
  remove_alpha_ios: true
