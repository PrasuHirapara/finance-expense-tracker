name: finance_analytics_app
description: "Personal finance analytics application with clean architecture."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  csv: ^6.0.0
  drift: ^2.28.2
  equatable: ^2.0.7
  fl_chart: ^1.1.1
  flutter_bloc: ^9.1.1
  flutter_local_notifications: ^21.0.0
  flutter_timezone: ^5.0.1
  go_router: ^16.2.1
  google_fonts: ^6.3.2
  intl: ^0.20.2
  path: ^1.9.1
  path_provider: ^2.1.5
  pdf: ^3.11.3
  sqlite3_flutter_libs: ^0.5.39
  timezone: ^0.11.0

dev_dependencies:
  build_runner: ^2.7.1
  drift_dev: ^2.28.2
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "daily_use_logo.png"
  remove_alpha_ios: true
